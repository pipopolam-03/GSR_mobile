<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>GSR + Polar Web Monitor</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>GSR + Polar Web Monitor</h1>

      <section class="card">
        <h2>Подключение</h2>
        <div class="row">
          <input id="backendWsUrl" value="ws://localhost:8765" />
          <button id="connectBackendBtn">Подключиться к backend</button>
        </div>
        <div class="grid">
          <div id="polarStatus" class="status">Polar: не подключен</div>
          <div id="hc06Status" class="status">HC-06: не подключен</div>
        </div>
      </section>

      <section class="card">
        <h2>Данные</h2>
        <div class="grid">
          <div><strong>GSR:</strong> <span id="gsrValue">—</span></div>
          <div><strong>ECG:</strong> <span id="ecgValue">—</span></div>
        </div>
      </section>

      <section class="card">
        <h2>Лог</h2>
        <pre id="log"></pre>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
